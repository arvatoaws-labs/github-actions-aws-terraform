name: 'Read local repo config'
description: 'Read local repo config'

inputs:
  config_file:
    type: string
    default: .github/config.yaml
    
outputs:
  config_data: 
    value: ${{ steps.read-yaml.outputs.config_data }}
  accounts: 
    value: ${{ steps.read-yaml.outputs.accounts }}
  stacks: 
    value: ${{ steps.read-yaml.outputs.stacks }}

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6

    - name: Read YAML
      id: read-yaml
      shell: bash

      run: |
        if [[ -f "${{ inputs.config_file }}" ]]; then
            # Validate JSON
            if yq eval '.' ${{ inputs.config_file }} > /dev/null 2>&1; then

              result=$(yq -o=json -I=0 '.include = .accounts | del(.accounts)' ${{ inputs.config_file }})
                # Use a heredoc to handle potential multiline data safely
                {
                  echo "config_data<<EOF"
                  echo "$result"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"

                result=$(yq -o=json -I=0 '.accounts = .accounts' ${{ inputs.config_file }})
                {
                  echo "accounts<<EOF"
                  echo "$result"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"

                result=$(yq -o=json -I=0 '[.accounts[].stack]' ${{ inputs.config_file }})
                {
                  echo "stacks<<EOF"
                  echo "$result"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
                
                echo "Successfully wrote config to GITHUB_OUTPUT"
            else
                echo "Error: ${{ inputs.config_file }} contains invalid YAML"
                exit 1
            fi
        else
            echo "Error: ${{ inputs.config_file }} not found"
            exit 1
        fi